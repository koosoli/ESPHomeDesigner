# ============================================================================
# ESPHome YAML - Generated by ESPHome Designer
# ============================================================================
# TARGET DEVICE: Guition ESP32-P4 JC4880P443
#         - Display Platform: mipi_dsi
#         - Touchscreen: GT911
#         - PSRAM: Yes (Hex)
#         - Framework: ESP-IDF with experimental ESP32-P4 features
# Name: Guition ESP32-P4 JC4880P443
# Resolution: 480x800
# Shape: rect
# Chip: esp32-p4
# Board: esp32-p4-evboard
# ============================================================================
#
# HARDWARE NOTES:
#         - ESP32-P4 boards do not have built-in WiFi. This board uses an
#           ESP32-C6 companion over SDIO, configured below via esp32_hosted.
#         - esp_ldo channel 3 powers the MIPI display rail.
#         - GPIO23 drives the display backlight PWM.
#         - ES8311 audio codec is wired on the shared I2C bus and I2S pins.
#
# SETUP INSTRUCTIONS:
#
# STEP 1: Create a new device in ESPHome
#         - Click "New Device"
#         - Select: ESP32-P4
#         - Board: esp32-p4-evboard
#         - Framework: ESP-IDF (Required)
#
# STEP 2: PASTE this snippet into your device YAML
#         - Paste this snippet at the end of your configuration.
#         - System sections (esphome, esp32, esp32_hosted, psram, esp_ldo)
#           are included because they are required for this board to boot,
#           connect to WiFi, and power the display.
#
# ============================================================================

esphome:
  min_version: 2025.12.0
  project:
    name: "Guition.ESP32-P4-JC4880P443"
    version: "1.0"

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  cpu_frequency: 360MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

esp_ldo:
  - channel: 3
    voltage: 2.5V

psram:
  mode: hex
  speed: 200MHz

preferences:
  flash_write_interval: 5min

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

i2c:
  - id: i2c_bus
    sda: GPIO7
    scl: GPIO8
    scan: false
    frequency: 400kHz

output:
  - platform: ledc
    pin: GPIO23
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    id: display_backlight
    name: Backlight
    output: gpio_backlight_pwm
    restore_mode: ALWAYS_ON

touchscreen:
  - platform: gt911
    id: device_touchscreen
    i2c_id: i2c_bus
    reset_pin: GPIO3
    update_interval: 16ms
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

display:
  - platform: mipi_dsi
    id: main_display
    model: JC4880P443
    byte_order: little_endian
    rotation: 0
    update_interval: never
    auto_clear_enabled: false
    # __LAMBDA_PLACEHOLDER__

audio_dac:
  - platform: es8311
    id: es8311_dac
    address: 0x18
    i2c_id: i2c_bus

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12
    i2s_mclk_pin: GPIO13

microphone:
  - platform: i2s_audio
    id: es8311_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO48
    adc_type: external
    pdm: false
    channel: left

speaker:
  - platform: i2s_audio
    id: es8311_hardware_out
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO9
    dac_type: external
    audio_dac: es8311_dac
