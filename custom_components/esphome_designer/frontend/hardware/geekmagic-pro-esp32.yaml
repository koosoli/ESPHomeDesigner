# ============================================================================
# ESPHome YAML - Generated by ESPHome Designer
# ============================================================================
# TARGET DEVICE: GeekMagic Pro (ESP32)
# Name: GeekMagic Pro (ESP32)
#         - Display Platform: mipi_spi (ST7789V)
# Resolution: 240x240
#         - Framework: Arduino
# ============================================================================

esphome:
  min_version: 2025.5.0

esp32:
  board: esp32dev
  framework:
    type: arduino

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  interface: hardware
  id: spihwd

display:
  - platform: mipi_spi
    id: my_display
    model: st7789v
    spi_id: spihwd
    data_rate: 40MHz
    dc_pin: GPIO2
    reset_pin: GPIO4
    spi_mode: MODE3
    dimensions:
      width: 240
      height: 240
    invert_colors: true
    auto_clear_enabled: false
    update_interval: never
    # __LAMBDA_PLACEHOLDER__

output:
  - platform: ledc
    pin: GPIO25
    inverted: true
    id: backlight_pwm

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: display_backlight
    restore_mode: ALWAYS_ON
