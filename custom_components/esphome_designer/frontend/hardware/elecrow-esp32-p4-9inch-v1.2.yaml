# ============================================================================
# ESPHome YAML - Generated by ESPHome Designer
# ============================================================================
# TARGET DEVICE: Elecrow ESP32-P4 9" HMI 1024x600 (V1.2)
# Name: Elecrow ESP32-P4 9" HMI 1024x600 (V1.2)
# Resolution: 1024x600
# Shape: rect
# Chip: esp32-p4
# Board: esp32-p4-evboard
# ============================================================================
#
# Based on Elecrow's V1.2 ESPHome configuration. Earlier hardware revisions
# use different ESP32-C6 SDIO wiring and must not use this profile.
#

esphome:
  min_version: 2026.7.0
  on_boot:
    priority: 800
    then:
      - output.turn_on: backlight_pwm
      - delay: 200ms
      - output.turn_off: power_light
      - delay: 500ms
      - light.turn_on:
          id: back_light
          brightness: 1

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  engineering_sample: true
  cpu_frequency: 360MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true

psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V
  - channel: 4
    voltage: 2.5V

esp32_hosted:
  variant: esp32c6
  active_high: true
  reset_pin: GPIO32
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO17
  d1_pin: GPIO16
  d2_pin: GPIO15
  d3_pin: GPIO14

i2c:
  - id: bus_a
    sda: GPIO45
    scl: GPIO46
    frequency: 400kHz

output:
  - platform: ledc
    pin: GPIO31
    id: backlight_pwm
  - platform: gpio
    id: power_light
    pin: GPIO29
    inverted: true

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_pwm
    id: back_light
    restore_mode: ALWAYS_ON
    internal: true

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    reset_pin: GPIO40
    interrupt_pin: GPIO42
    update_interval: 50ms
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false

display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    reset_pin: GPIO41
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 1024
      height: 600
    color_order: RGB
    color_depth: 16
    # __LAMBDA_PLACEHOLDER__
