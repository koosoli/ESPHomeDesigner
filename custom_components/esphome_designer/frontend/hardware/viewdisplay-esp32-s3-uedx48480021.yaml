esphome:
  min_version: 2024.11.0
  project:
    name: "ViewDisplay.ESP32-S3-UEDX48480021"
    version: "1.0"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

logger:
  level: DEBUG

spi:
  - id: lcd_spi
    clk_pin:
      number: GPIO13
      allow_other_uses: true
    mosi_pin:
      number: GPIO12
      allow_other_uses: true

output:
  - platform: ledc
    pin: GPIO7
    id: gpio_backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

i2c:
  - id: bus_a
    sda: GPIO16
    scl: GPIO15
    scan: true

display:
  - platform: st7701s
    id: my_display
    rotation: 0
    update_interval: 1s
    auto_clear_enabled: true
    color_order: RGB
    dimensions:
      width: 480
      height: 480
    cs_pin: GPIO18
    reset_pin:
      number: GPIO8
      allow_other_uses: true
    de_pin: GPIO17
    hsync_pin: GPIO46
    vsync_pin: GPIO3
    pclk_pin: GPIO9
    pclk_frequency: 12MHz
    hsync_pulse_width: 255
    hsync_front_porch: 1
    hsync_back_porch: 255
    vsync_pulse_width: 254
    vsync_front_porch: 2
    vsync_back_porch: 254
    data_pins:
      red: [40, 41, 42, 2, 1]
      green: [21, 47, 48, 45, 38, 39]
      blue:
        - 10
        - 11
        - number: 12
          allow_other_uses: true
        - number: 13
          allow_other_uses: true
        - 14
    # __LAMBDA_PLACEHOLDER__

touchscreen:
  - platform: cst816
    id: my_touchscreen
    reset_pin:
      number: GPIO8
      allow_other_uses: true
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

sensor:
  - platform: rotary_encoder
    name: Rotary Encoder
    id: knob_encoder
    pin_a: GPIO6
    pin_b: GPIO5
    resolution: 2
    internal: true

binary_sensor:
  # __TOUCH_SENSORS_PLACEHOLDER__
  - platform: gpio
    name: Encoder Button
    id: encoder_button
    pin:
      number: GPIO0
      inverted: true
      ignore_strapping_warning: true
    internal: true