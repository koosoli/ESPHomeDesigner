name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Enforce baseline governance
      if: github.event_name == 'pull_request' || github.ref_name == 'dev'
      run: npm run quality:baseline-governance

    - name: Install Python test dependencies
      run: python -m pip install -r requirements-dev.txt
        
    - name: Install dependencies
      run: npm ci

    # If this step ever fails again, first reproduce it locally with:
    # npm run verify:dist
    # npm run verify:pre-push:skip-hassfest
    # npm run release:prepare:skip-hassfest
    #
    # The verifier is strict for real stale dist output, but in CI it also
    # cross-checks committed HEAD so harmless checkout-only text normalization
    # does not false-fail the job. If it still fails, inspect:
    # - custom_components/esphome_designer/frontend/dist/build-meta.json
    # - scripts/dist_build_meta.cjs
    # - scripts/verify_dist_fresh.cjs
    # - the full custom_components/esphome_designer/frontend/dist/ upload
    - name: Verify committed dist is current
      run: node scripts/verify_dist_fresh.cjs

    - name: Run canonical quality gate
      run: npm run quality -- --json --proof-dir=tmp/proof/ci

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always() && hashFiles('coverage/**') != ''
      with:
        name: coverage-report-${{ matrix.node-version }}
        path: coverage/

    - name: Upload proof bundle
      uses: actions/upload-artifact@v4
      if: always() && hashFiles('tmp/proof/ci/**') != ''
      with:
        name: quality-proof-${{ matrix.node-version }}
        path: tmp/proof/ci/
