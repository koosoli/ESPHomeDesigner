name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: test (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Enforce baseline governance
      run: npm run quality:baseline-governance

    - name: Install Python test dependencies
      run: python -m pip install -r requirements-dev.txt
        
    - name: Install dependencies
      run: npm ci

    - name: Verify committed dist is current
      run: node scripts/verify_dist_fresh.cjs

    - name: Run canonical quality gate
      run: npm run quality -- --json --proof-dir=tmp/proof/ci

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-${{ matrix.node-version }}
        path: coverage/

    - name: Upload proof bundle
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: quality-proof-${{ matrix.node-version }}
        path: tmp/proof/ci/
        if-no-files-found: error
